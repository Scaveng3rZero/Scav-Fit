<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#121826" />
  <title>Scav Training Log</title>
  <style>
    :root {
      --bg: #0b1020;
      --bg-2: #11182c;
      --panel: rgba(18, 24, 38, 0.92);
      --panel-2: rgba(27, 36, 58, 0.92);
      --line: rgba(149, 167, 201, 0.18);
      --text: #f4f7ff;
      --muted: #a6b4d3;
      --soft: #d7e0f5;
      --accent: #6ee7b7;
      --accent-2: #60a5fa;
      --accent-3: #c084fc;
      --accent-4: #f59e0b;
      --danger: #fb7185;
      --shadow: 0 20px 50px rgba(0, 0, 0, 0.34);
      --radius: 24px;
      --radius-sm: 16px;
      --tap: 50px;
      --max: 1200px;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(96,165,250,.22), transparent 28%),
        radial-gradient(circle at top right, rgba(192,132,252,.18), transparent 30%),
        radial-gradient(circle at bottom left, rgba(110,231,183,.12), transparent 26%),
        linear-gradient(180deg, #070b16 0%, #0c1221 45%, #0a1020 100%);
      padding-bottom: 120px;
    }

    .app {
      max-width: var(--max);
      margin: 0 auto;
      padding: 14px 14px 28px;
    }

    .shell {
      display: grid;
      gap: 14px;
    }

    .card {
      background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.02));
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
      overflow: hidden;
    }

    .hero {
      position: relative;
      padding: 18px;
      background:
        radial-gradient(circle at top right, rgba(245,158,11,.18), transparent 28%),
        radial-gradient(circle at bottom left, rgba(110,231,183,.16), transparent 26%),
        linear-gradient(135deg, rgba(17,24,44,.96), rgba(28,35,59,.94));
    }

    .hero::after {
      content: "";
      position: absolute;
      inset: auto -40px -40px auto;
      width: 150px;
      height: 150px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(96,165,250,.18), transparent 65%);
      pointer-events: none;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.08);
      color: var(--soft);
      font-size: .84rem;
      margin-bottom: 12px;
    }

    h1, h2, h3, h4, p { margin-top: 0; }

    h1 {
      font-size: clamp(1.9rem, 6vw, 3rem);
      line-height: 1.02;
      margin-bottom: 8px;
      letter-spacing: -0.03em;
    }

    .sub {
      color: var(--muted);
      line-height: 1.55;
      margin-bottom: 16px;
      max-width: 58ch;
    }

    .stats-row,
    .badge-row,
    .button-row,
    .segmented {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .badge,
    .stat-chip,
    .tag {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border-radius: 999px;
      padding: 9px 12px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,.05);
      color: var(--soft);
      font-size: .9rem;
    }

    .quick-grid,
    .summary-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .summary-card,
    .mini-card,
    .section,
    .exercise-card,
    .history-item {
      padding: 16px;
    }

    .summary-card,
    .mini-card {
      border-radius: 20px;
      border: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.02));
    }

    .summary-card h4,
    .mini-card h4 {
      font-size: .8rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .06em;
      margin-bottom: 8px;
    }

    .big {
      font-size: 1.8rem;
      font-weight: 800;
      letter-spacing: -0.03em;
    }

    .section-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .muted {
      color: var(--muted);
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }

    label {
      display: block;
      color: var(--muted);
      font-size: .9rem;
      margin-bottom: 8px;
    }

    input,
    select,
    textarea,
    button {
      width: 100%;
      font: inherit;
      border-radius: var(--radius-sm);
    }

    input,
    select,
    textarea {
      min-height: var(--tap);
      border: 1px solid var(--line);
      background: rgba(6, 10, 20, 0.72);
      color: var(--text);
      padding: 13px 14px;
      outline: none;
    }

    input:focus,
    textarea:focus,
    select:focus {
      border-color: rgba(96,165,250,.7);
      box-shadow: 0 0 0 4px rgba(96,165,250,.14);
    }

    textarea {
      min-height: 96px;
      resize: vertical;
    }

    button {
      min-height: var(--tap);
      border: 0;
      padding: 12px 16px;
      font-weight: 800;
      cursor: pointer;
      transition: transform .14s ease, opacity .14s ease, filter .14s ease;
    }

    button:hover { transform: translateY(-1px); filter: brightness(1.03); }
    button:active { transform: translateY(0); }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), #34d399);
      color: #07120d;
      box-shadow: 0 12px 24px rgba(52,211,153,.24);
    }

    .btn-secondary {
      background: linear-gradient(135deg, var(--accent-2), #818cf8);
      color: #08111d;
      box-shadow: 0 12px 24px rgba(96,165,250,.24);
    }

    .btn-muted {
      background: rgba(255,255,255,.06);
      color: var(--text);
      border: 1px solid var(--line);
    }

    .btn-danger {
      background: linear-gradient(135deg, #fb7185, #f43f5e);
      color: #21070c;
    }

    .segmented {
      background: rgba(255,255,255,.04);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 6px;
    }

    .segmented button {
      width: auto;
      min-height: 42px;
      padding: 10px 14px;
      border-radius: 999px;
      background: transparent;
      color: var(--muted);
      box-shadow: none;
    }

    .segmented .active {
      background: linear-gradient(135deg, rgba(96,165,250,.24), rgba(192,132,252,.18));
      color: var(--text);
      border: 1px solid rgba(255,255,255,.08);
    }

    .checkline {
      display: flex;
      gap: 10px;
      align-items: center;
      padding: 12px 14px;
      border-radius: 18px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,.04);
      color: var(--soft);
      margin-top: 10px;
    }

    .checkline input {
      width: 22px;
      height: 22px;
      min-height: auto;
      accent-color: #34d399;
      flex: 0 0 auto;
    }

    .section ul {
      margin: 10px 0 0;
      padding-left: 20px;
      color: var(--muted);
      line-height: 1.7;
    }

    .exercise-list {
      display: grid;
      gap: 12px;
    }

    .exercise-card {
      border: 1px solid var(--line);
      border-radius: 22px;
      background: linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.02));
    }

    .exercise-top {
      display: flex;
      align-items: center;
      gap: 12px;
      justify-content: space-between;
